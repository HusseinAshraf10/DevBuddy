<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DevBuddy</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup">
      <header class="top">
        <div class="brand">
          <img src="icons/icon128.png" alt="DevBuddy icon" class="app-icon" />
          <div>
            <h1>DevBuddy</h1>
            <p class="subtitle">Quick glossary for core programming concepts.</p>
          </div>
        </div>
        <div class="top-actions">
          <span id="termCount" class="badge">Loading...</span>
          <button id="closePopupBtn" class="close-popup-btn" type="button" aria-label="Close popup" title="Close">
            &times;
          </button>
        </div>
      </header>

      <label class="label" for="termInput">Type a programming term</label>
      <div class="row">
        <input id="termInput" type="text" placeholder="compiler" autocomplete="off" />
        <button id="searchBtn" type="button">Search</button>
      </div>

      <div id="result" class="result">Try: compiler, closure, or api</div>

      <section class="panel">
        <h2>Add New term</h2>
        <input id="addTermInput" type="text" placeholder="New term" autocomplete="off" />
        <textarea id="addMeaningInput" rows="3" placeholder="write the meaning..."></textarea>
        <button id="addFavoriteBtn" type="button" class="full-btn">Add</button>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>Favorites</h2>
          <span id="favoriteCount" class="badge">0</span>
        </div>
        <p id="favoritesEmpty" class="empty-state">No favorite terms yet.</p>
        <ul id="favoritesList" class="favorites-list"></ul>
      </section>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
